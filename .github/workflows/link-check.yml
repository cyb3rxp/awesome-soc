name: Resilient Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # hebdomadaire, lundi 6h

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@v2.0.2
        id: lychee
        with:
          args: >
            --verbose
            --no-progress
            --timeout 20
            --redirection
            --ignore-status 429
            --json-report lychee-report.json
            "./**/*.md"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lychee-report
          path: lychee-report.json

      - name: Generate PR summary
        if: github.event_name == 'pull_request'
        run: |
          echo "### Link Checker Summary" > lychee-summary.md
          jq -r '.[] | "\(.status) - \(.url)"' lychee-report.json >> lychee-summary.md
          cat lychee-summary.md
          echo "::set-output name=summary::$(cat lychee-summary.md)"
